[build]
  command = "npm run build"
  publish = ".next"

[functions]
  external_node_modules = ["@google/generative-ai"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers (X-Frame-Options, CSP with Supabase host, etc.) live in next.config.ts
# so the Supabase hostname can be derived from NEXT_PUBLIC_SUPABASE_URL at build time.
# Only Netlify-specific concerns (legacy headers, service worker cache) stay here.

[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
